<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="true" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Khalil Project" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23000' width='180' height='180' rx='40'/><text x='90' y='100' font-size='120' text-anchor='middle' dominant-baseline='central' fill='%23fff'>💪</text></svg>" />
  <title>The Khalil Project</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #ffffff;
      color: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      padding: env(safe-area-inset-top) 18px env(safe-area-inset-bottom) 18px;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 460px;
      padding-bottom: 60px;
    }

    .title {
      text-align: center;
      margin-top: 24px;
      margin-bottom: 36px;
    }

    .title h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .title p {
      margin-top: 6px;
      font-size: 0.95rem;
      opacity: 0.6;
    }

    .screen {
      display: none;
      animation: fade 0.2s ease;
    }

    .screen.active {
      display: block;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .split-grid {
      display: grid;
      gap: 16px;
    }

    .card {
      border: none;
      border-radius: 16px;
      padding: 24px;
      background: #f5f5f7;
      transition: 0.15s ease;
      cursor: pointer;
    }

    .card:active {
      opacity: 0.7;
      transform: scale(0.98);
    }

    .card h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .card p {
      opacity: 0.6;
      font-size: 0.95rem;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 8px;
    }

    button {
      border: none;
      background: #000;
      color: #fff;
      padding: 10px 16px;
      border-radius: 10px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s ease;
      -webkit-user-select: none;
      user-select: none;
    }

    button:active {
      opacity: 0.7;
      transform: scale(0.95);
    }

    .secondary-btn {
      background: #f3f3f7;
      color: #000;
      border: none;
    }

    .delete-btn {
      background: #fff;
      color: #000;
      border: 1px solid #d8d8d8;
    }

    .workout-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .exercise-card {
      border: none;
      border-radius: 16px;
      padding: 20px;
      background: #f5f5f7;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .exercise-card:active {
      opacity: 0.7;
    }

    .exercise-card h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .pr-display {
      background: #fff;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      border: 1px solid #efefef;
    }

    .pr-label {
      font-size: 0.8rem;
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .pr-value {
      font-size: 1.1rem;
      font-weight: 600;
      color: #000;
    }

    .pr-details {
      font-size: 0.85rem;
      opacity: 0.6;
      margin-top: 4px;
    }

    .last-volume {
      font-size: 0.95rem;
      opacity: 0.6;
    }

    .section-title {
      font-size: 1.2rem;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .history-card {
      border: none;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 10px;
      background: #f5f5f7;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-left {
      flex: 1;
    }

    .history-date {
      font-size: 0.85rem;
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 6px;
    }

    .history-detail {
      font-size: 0.95rem;
      font-weight: 500;
      opacity: 0.8;
    }

    .history-volume {
      text-align: right;
      font-weight: 600;
      font-size: 1.1rem;
    }

    .history-volume-label {
      font-size: 0.75rem;
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .set-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #d9d9d9;
      background: #fff;
      color: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 1rem;
      outline: none;
    }

    input:focus {
      border-color: #000;
    }

    .input-group {
      margin-bottom: 14px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      opacity: 0.7;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .chart-container {
      display: none;
      margin-top: 24px;
      padding: 18px;
      border: none;
      border-radius: 16px;
      background: #f5f5f7;
    }

    .chart-container.active {
      display: block;
    }

    .chart-toggle-btn {
      background: #000;
      color: #fff;
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .chart-toggle-btn:active {
      opacity: 0.7;
      transform: scale(0.95);
    }

    .empty-state {
      opacity: 0.5;
      text-align: center;
      padding: 30px 20px;
      font-size: 1rem;
    }

    .small-text {
      opacity: 0.6;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .divider {
      height: 1px;
      background: #efefef;
      margin: 22px 0;
    }

    @media (max-width: 420px) {
      .title h1 {
        font-size: 1.9rem;
      }

      .card,
      .exercise-card,
      .history-card,
      .chart-container {
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app">

    <div class="title">
      <h1>The Khalil Project</h1>
      <p>Workout Progress Tracker</p>
    </div>

    <div id="homeScreen" class="screen active">
      <div class="split-grid">
        <div class="card" onclick="openSplit('Push')">
          <h2>Push</h2>
          <p>Chest · Shoulders · Triceps</p>
        </div>

        <div class="card" onclick="openSplit('Pull')">
          <h2>Pull</h2>
          <p>Back · Biceps · Rear Delts</p>
        </div>

        <div class="card" onclick="openSplit('Legs')">
          <h2>Legs</h2>
          <p>Quads · Hamstrings · Calves</p>
        </div>
      </div>
    </div>

    <div id="splitScreen" class="screen">
      <div class="top-bar">
        <button class="secondary-btn" onclick="goHome()">Back</button>
        <button class="add-btn" onclick="showAddWorkout()">+ Add</button>
      </div>

      <h2 id="splitTitle" class="section-title"></h2>

      <div id="workoutList" class="workout-list"></div>
    </div>

    <div id="exerciseScreen" class="screen">
      <div class="top-bar">
        <button class="secondary-btn" onclick="backToSplit()">Back</button>
        <button class="add-btn" onclick="addSetRow()">+ Set</button>
      </div>

      <h2 id="exerciseTitle" class="section-title"></h2>

      <div class="small-text" id="latestVolume"></div>

      <div id="prDisplay" style="margin-top: 12px; margin-bottom: 16px;"></div>

      <div class="divider"></div>

      <h3 class="section-title">New Entry</h3>

      <div id="setContainer"></div>

      <div class="button-row">
        <button class="save-btn" onclick="saveWorkoutEntry()">Save Entry</button>
      </div>

      <div style="margin-top: 16px; margin-bottom: 16px; text-align: center;">
        <button class="chart-toggle-btn" onclick="toggleChart()">View Progression</button>
      </div>

      <div class="chart-container" id="chartContainer">
        <button class="chart-toggle-btn" onclick="toggleChart()" style="width: 100%; margin-bottom: 16px;">Hide Progression</button>
        <h3 class="section-title">Progression</h3>
        <canvas id="progressChart"></canvas>
      </div>

      <div class="divider"></div>

      <h3 class="section-title">History</h3>

      <div id="historyContainer"></div>
    </div>

    <div id="addWorkoutScreen" class="screen">
      <div class="top-bar">
        <button class="secondary-btn" onclick="backToSplit()">Back</button>
      </div>

      <h2 class="section-title">Add Workout</h2>

      <div class="input-group">
        <label>Workout Name</label>
        <input id="newWorkoutName" type="text" placeholder="Bench Press" />
      </div>

      <div class="button-row">
        <button class="save-btn" onclick="addWorkout()">Save Workout</button>
      </div>
    </div>

  </div>

  <script>
    let currentSplit = '';
    let currentExercise = '';
    let chartInstance = null;

    const defaultData = {
      Push: [
        { name: 'Bench Press', entries: [], pr: { volume: 0, sets: 0, reps: 0, weight: 0 } },
        { name: 'Incline Dumbbell Press', entries: [], pr: { volume: 0, sets: 0, reps: 0, weight: 0 } },
        { name: 'Shoulder Press', entries: [], pr: { volume: 0, sets: 0, reps: 0, weight: 0 } }
      ],
      Pull: [
        { name: 'Lat Pulldown', entries: [], pr: { volume: 0, sets: 0, reps: 0, weight: 0 } },
        { name: 'Barbell Row', entries: [], pr: { volume: 0, sets: 0, reps: 0, weight: 0 } },
        { name: 'Hammer Curl', entries: [], pr: { volume: 0, sets: 0, reps: 0, weight: 0 } }
      ],
      Legs: [
        { name: 'Leg Press', entries: [], pr: { volume: 0, sets: 0, reps: 0, weight: 0 } },
        { name: 'Romanian Deadlift', entries: [], pr: { volume: 0, sets: 0, reps: 0, weight: 0 } },
        { name: 'Leg Extension', entries: [], pr: { volume: 0, sets: 0, reps: 0, weight: 0 } }
      ]
    };

    function getData() {
      const saved = localStorage.getItem('khalilProjectData');
      if (saved) return JSON.parse(saved);

      localStorage.setItem('khalilProjectData', JSON.stringify(defaultData));
      return defaultData;
    }

    function saveData(data) {
      localStorage.setItem('khalilProjectData', JSON.stringify(data));
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(screen => {
        screen.classList.remove('active');
      });

      document.getElementById(id).classList.add('active');
    }

    function toggleChart() {
      const chartContainer = document.getElementById('chartContainer');
      chartContainer.classList.toggle('active');
      if (chartContainer.classList.contains('active')) {
        setTimeout(() => {
          renderChart();
        }, 100);
      }
    }

    function openSplit(split) {
      currentSplit = split;
      document.getElementById('splitTitle').textContent = split + ' Workouts';
      renderWorkoutList();
      showScreen('splitScreen');
    }

    function renderWorkoutList() {
      const data = getData();
      const container = document.getElementById('workoutList');
      container.innerHTML = '';

      data[currentSplit].forEach(workout => {
        const lastEntry = workout.entries[workout.entries.length - 1];
        const currentPR = workout.pr;

        const card = document.createElement('div');
        card.className = 'exercise-card';
        card.onclick = () => openExercise(workout.name);

        let prHtml = '';
        if (currentPR && currentPR.volume > 0) {
          prHtml = `
            <div class="pr-display">
              <div class="pr-label">Personal Record</div>
              <div class="pr-value">${currentPR.weight} lbs</div>
              <div class="pr-details">${currentPR.sets}×${currentPR.reps} • ${currentPR.volume.toLocaleString()} vol</div>
            </div>
          `;
        }

        card.innerHTML = `
          ${prHtml}
          <h3>${workout.name}</h3>
          <p class="last-volume">
            ${lastEntry
              ? `Last: ${calculateVolume(lastEntry.sets).toLocaleString()} lbs`
              : 'No entries yet'}
          </p>
        `;

        container.appendChild(card);
      });
    }

    function openExercise(name) {
      currentExercise = name;
      document.getElementById('exerciseTitle').textContent = name;
      document.getElementById('setContainer').innerHTML = '';
      document.getElementById('chartContainer').classList.remove('active');

      addSetRow();
      renderPRDisplay();
      renderHistory();

      showScreen('exerciseScreen');
    }

    function renderPRDisplay() {
      const data = getData();
      const exercise = data[currentSplit].find(w => w.name === currentExercise);
      const container = document.getElementById('prDisplay');

      if (!exercise.pr || exercise.pr.volume === 0) {
        container.innerHTML = '';
        return;
      }

      container.innerHTML = `
        <div class="pr-display">
          <div class="pr-label">Personal Record</div>
          <div class="pr-value">${exercise.pr.weight} lbs</div>
          <div class="pr-details">${exercise.pr.sets}×${exercise.pr.reps} • ${exercise.pr.volume.toLocaleString()} vol</div>
        </div>
      `;
    }

    function addSetRow() {
      const row = document.createElement('div');
      row.className = 'set-row';

      row.innerHTML = `
        <input type="number" placeholder="Sets" class="sets" />
        <input type="number" placeholder="Reps" class="reps" />
        <input type="number" placeholder="Weight" class="weight" />
      `;

      document.getElementById('setContainer').appendChild(row);
    }

    function saveWorkoutEntry() {
      const rows = document.querySelectorAll('.set-row');
      const sets = [];

      rows.forEach(row => {
        const setCount = row.querySelector('.sets').value;
        const reps = row.querySelector('.reps').value;
        const weight = row.querySelector('.weight').value;

        if (setCount && reps && weight) {
          sets.push({
            sets: Number(setCount),
            reps: Number(reps),
            weight: Number(weight)
          });
        }
      });

      if (sets.length === 0) return;

      const data = getData();
      const exercise = data[currentSplit].find(w => w.name === currentExercise);
      const volume = calculateVolume({ sets });

      // Update PR if this volume is heavier (highest single set weight)
      const maxWeight = Math.max(...sets.map(s => s.weight));
      const maxWeightSet = sets.find(s => s.weight === maxWeight);

      if (!exercise.pr || volume > exercise.pr.volume) {
        exercise.pr = {
          volume: volume,
          sets: maxWeightSet.sets,
          reps: maxWeightSet.reps,
          weight: maxWeightSet.weight
        };
      }

      exercise.entries.unshift({
        date: new Date().toLocaleDateString(),
        timestamp: Date.now(),
        sets
      });

      saveData(data);

      document.getElementById('setContainer').innerHTML = '';
      addSetRow();

      renderPRDisplay();
      renderHistory();
      renderWorkoutList();
    }

    function renderHistory() {
      const data = getData();
      const exercise = data[currentSplit].find(w => w.name === currentExercise);
      const container = document.getElementById('historyContainer');
      const latestText = document.getElementById('latestVolume');

      container.innerHTML = '';

      if (exercise.entries.length === 0) {
        latestText.textContent = 'No entries yet';
        container.innerHTML = '<div class="empty-state">No workout history available.</div>';
        return;
      }

      const latestVolume = calculateVolume(exercise.entries[0].sets);
      latestText.textContent = `Latest Volume: ${latestVolume.toLocaleString()} lbs`;

      exercise.entries.forEach(entry => {
        const volume = calculateVolume(entry.sets);
        const maxWeight = Math.max(...entry.sets.map(s => s.weight));
        const maxWeightSet = entry.sets.find(s => s.weight === maxWeight);

        const card = document.createElement('div');
        card.className = 'history-card';

        card.innerHTML = `
          <div class="history-left">
            <div class="history-date">${entry.date}</div>
            <div class="history-detail">${maxWeightSet.sets}×${maxWeightSet.reps} @ ${maxWeightSet.weight} lbs</div>
          </div>
          <div class="history-volume">
            <div class="history-volume-label">VOL</div>
            <div>${volume.toLocaleString()}</div>
          </div>
        `;

        container.appendChild(card);
      });
    }

    function calculateVolume(entry) {
      return entry.sets.reduce((total, set) => {
        return total + (set.sets * set.reps * set.weight);
      }, 0);
    }

    function renderChart() {
      const data = getData();
      const exercise = data[currentSplit].find(w => w.name === currentExercise);
      const ctx = document.getElementById('progressChart');

      const entries = [...exercise.entries].reverse();

      const labels = entries.map(entry => {
        const date = new Date(entry.timestamp);
        return (date.getMonth() + 1) + '/' + date.getDate();
      });
      const volumes = entries.map(entry => calculateVolume(entry));

      if (chartInstance) {
        chartInstance.destroy();
      }

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: volumes,
            borderColor: '#000000',
            backgroundColor: 'rgba(0,0,0,0.08)',
            tension: 0.3,
            borderWidth: 2.5,
            fill: true,
            pointRadius: 4,
            pointBackgroundColor: '#000000',
            pointBorderColor: '#ffffff',
            pointBorderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: {
              display: false
            }
          },
          scales: {
            x: {
              ticks: {
                color: '#666',
                font: {
                  family: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
                  size: 12
                }
              },
              grid: {
                display: false
              }
            },
            y: {
              beginAtZero: true,
              ticks: {
                color: '#666',
                font: {
                  family: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
                  size: 12
                }
              },
              grid: {
                color: '#f0f0f0',
                drawBorder: false
              }
            }
          }
        }
      });
    }

    function showAddWorkout() {
      document.getElementById('newWorkoutName').value = '';
      showScreen('addWorkoutScreen');
    }

    function addWorkout() {
      const name = document.getElementById('newWorkoutName').value.trim();

      if (!name) return;

      const data = getData();

      data[currentSplit].push({
        name,
        entries: [],
        pr: { volume: 0, sets: 0, reps: 0, weight: 0 }
      });

      saveData(data);
      renderWorkoutList();
      showScreen('splitScreen');
    }

    function goHome() {
      showScreen('homeScreen');
    }

    function backToSplit() {
      renderWorkoutList();
      showScreen('splitScreen');
    }
  </script>
</body>
</html>
